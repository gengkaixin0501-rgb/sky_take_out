	function getRandom(N, M) {
		return Math.floor(Math.random() * (M - N + 1)) + N
	}

	let random = getRandom(1, 10)

	while (true) {
		let num = +prompt()
		if (num > random) {
			alert('猜大了')
		} else if (num < random) {
			alert('猜小了')
		} else {
			alert('恭喜你')
			break
		}
